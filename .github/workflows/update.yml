name: Daily Update and Deploy

on:
  schedule:
    # 毎日 日本時間(JST)の午前2:00は、UTCの17:00となります。
    - cron: '0 17 * * *'
  # GitHubのActionsタブから手動で実行するためのトリガー
  workflow_dispatch:

# GitHub Pagesへのデプロイに必要な権限設定（OIDC認証を利用）
permissions:
  contents: read
  pages: write
  id-token: write

# 複数回同時にトリガーされた場合、後続のジョブをキャンセルせず待機させる排他制御
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Scraper
        # データ取得を実行し apps/frontend/public/data/latest.json を生成
        run: bun run --cwd packages/scraper start

      - name: Build Frontend
        # Viteによる静的サイトのビルド（latest.json も dist に含まれる）
        run: bun run --cwd apps/frontend build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Viteのデフォルトのビルド出力先を指定
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
